<!DOCTYPE html>
<html>
<head>
    <title>Sumit Parmar - SDE Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            font-family: Arial, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
        }
        h1 {
            font-size: 40px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FF9500, #FF2D55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #aaa;
            margin-bottom: 40px;
            font-size: 18px;
        }
        .projects {
            display: grid;
            gap: 20px;
        }
        .card {
            background: #000;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .card:hover {
            border-color: #FF9500;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 149, 0, 0.3);
        }
        .card h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .card span {
            font-size: 40px;
            display: block;
            margin-bottom: 15px;
        }
        .emoji { font-size: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">👨‍💻</div>
        <h1>Sumit Parmar</h1>
        <p>Future SDE | Building Projects Daily</p>
        
        <div class="projects">
            <a href="todo.html" class="card">
                <span>📝</span>
                <h2>Todo App</h2>
                <p>Task manager with local storage</p>
            </a>
            
            <a href="calculator.html" class="card">
                <span>🧮</span>
                <h2>iPhone Calculator</h2>
                               <p>Fully functional calculator</p>
            </a>

            <a href="snake.html" class="card">
                <span>🐍</span>
                <h2>Snake Game</h2>
                <p>Classic Nokia wala game</p>
            </a>
        </div>
    </div>
</body>
</html>
        </div>
    </div>
</body>
</html>
