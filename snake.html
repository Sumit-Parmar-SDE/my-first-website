<!DOCTYPE html>
<html>
<head>
    <title>3D Snake Pro - Sumit SDE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0f0f0f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
            padding: 20px;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 3rem;
            background: linear-gradient(45deg, #00ff88, #00ccff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px #00ff88); }
            50% { filter: drop-shadow(0 0 40px #00ccff); }
        }
    .score {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0, 255, 136, 1);
        }
    .game-wrapper {
            perspective: 1200px;
            transform-style: preserve-3d;
        }
    .game-board {
            transform: rotateX(50deg) rotateZ(-10deg);
            transform-style: preserve-3d;
            position: relative;
        }
        canvas {
            border: 3px solid #00ff88;
            border-radius: 8px;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.9),
                0 0 50px rgba(0, 255, 136, 0.3);
            display: block;
        }
    .controls {
            margin-top: 40px;
            text-align: center;
        }
        button {
            background: linear-gradient(145deg, #00ff88, #00aa55);
            color: #000;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            margin: 5px;
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.4);
            transition: all 0.15s;
        }
        button:hover { transform: translateY(-3px); }
        button:active { transform: translateY(0px); }
    .keys {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
    .mobile-controls {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(3, 85px);
            gap: 15px;
            justify-content: center;
        }
    .mobile-controls button {
            padding: 25px;
            font-size: 30px;
            margin: 0;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <h1>🐍 3D SNAKE PRO</h1>
    <div class="score">Score: <span id="score">0</span></div>

    <div class="game-wrapper">
        <div class="game-board">
            <canvas id="game" width="400" height="400"></canvas>
        </div>
    </div>

    <div class="controls">
        <button onclick="startGame()">Start / Restart</button>
        <div class="keys">Laptop: Arrow Keys | Mobile: Buttons</div>
    </div>

    <div class="mobile-controls">
        <div></div>
        <button onclick="setDirection('up')">↑</button>
        <div></div>
        <button onclick="setDirection('left')">←</button>
        <button onclick="setDirection('down')">↓</button>
        <button onclick="setDirection('right')">→</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const grid = 20;
        const size = 20;
        let snake = [];
        let food = {};
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameRunning = false;
        let lastTime = 0;
        const speed = 120; // Smooth speed control

        // 3D Cube draw function
        function drawCube(x, y, color, isHead = false) {
            const px = x * grid;
            const py = y * grid;
            const h = 8; // 3D height

            // Top face
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(px + size, py);
            ctx.lineTo(px + size - h, py - h);
            ctx.lineTo(px - h, py - h);
            ctx.closePath();
            ctx.fill();

            // Right face - darker
            ctx.fillStyle = shadeColor(color, -30);
            ctx.beginPath();
            ctx.moveTo(px + size, py);
            ctx.lineTo(px + size, py + size);
            ctx.lineTo(px + size - h, py + size - h);
            ctx.lineTo(px + size - h, py - h);
            ctx.closePath();
            ctx.fill();

            // Front face - normal
            ctx.fillStyle = shadeColor(color, -15);
            ctx.fillRect(px - h, py - h, size, size);

            // Head glow
            if (isHead) {
                ctx.shadowColor = color;
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(px - h + 6, py - h + 6, size - 12, size - 12);
                ctx.shadowBlur = 0;
            }
        }

        function shadeColor(color, percent) {
            const num = parseInt(color.slice(1), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
        }

        function drawFood() {
            const px = food.x * grid;
            const py = food.y * grid;
            const h = 10;

            // 3D Apple/Sphere effect
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 25;

            // Top
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(px + size/2 - h/2, py + size/2 - h/2, size/2, 0, Math.PI * 2);
            ctx.fill();

            // Side
            ctx.fillStyle = '#cc0000';
            ctx.beginPath();
            ctx.ellipse(px + size/2 - h/2, py + size/2, size/2, size/3, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function initGame() {
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreEl.textContent = score;
            generateFood();
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * 20);
            food.y = Math.floor(Math.random() * 20);
            // Check if food on snake
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }

        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Wall collision
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
                gameOver();
                return;
            }

            // Self collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);

            // Draw food first
            drawFood();

            // Draw snake
            snake.forEach((part, index) => {
                const color = index === 0? '#00ff88' : '#00cc66';
                drawCube(part.x, part.y, color, index === 0);
            });
        }

        function gameLoop(currentTime) {
            if (!gameRunning) return;

            window.requestAnimationFrame(gameLoop);

            const deltaTime = currentTime - lastTime;
            if (deltaTime > speed) {
                lastTime = currentTime;
                update();
                draw();
            }
        }

        function startGame() {
            initGame();
            gameRunning = true;
            lastTime = 0;
            window.requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            setTimeout(() => {
                alert('Game Over! Score: ' + score);
            }, 100);
        }

        function setDirection(dir) {
            if (!gameRunning) return;
            if (dir === 'up' && dy === 0) { dx = 0; dy = -1; }
            if (dir === 'down' && dy === 0) { dx = 0; dy = 1; }
            if (dir === 'left' && dx === 0) { dx = -1; dy = 0; }
            if (dir === 'right' && dx === 0) { dx = 1; dy = 0; }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') setDirection('up');
            if (e.key === 'ArrowDown') setDirection('down');
            if (e.key === 'ArrowLeft') setDirection('left');
            if (e.key === 'ArrowRight') setDirection('right');
        });

        // Initial draw
        initGame();
        draw();
    </script>
</body>
</html>
