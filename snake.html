<!DOCTYPE html>
<html>
<head>
    <title>Snake Pro Max - Sumit SDE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial Black', sans-serif;
            color: white;
            padding: 10px;
            overflow: hidden;
        }
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
       .game-ui {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 3s linear infinite;
        }
        @keyframes rainbow {
            to { background-position: 200% center; }
        }
   .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 24px;
            font-weight: bold;
        }
   .score { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
   .high-score { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }
   .level { color: #00ccff; text-shadow: 0 0 10px #00ccff; }
   .game-container {
            perspective: 1000px;
            margin: 20px 0;
        }
        canvas {
            border: 4px solid #ff0080;
            border-radius: 10px;
            background: #0a0a0a;
            box-shadow:
                0 0 40px rgba(255, 0, 128, 0.6),
                0 20px 50px rgba(0, 0, 0, 0.9);
            transform: rotateX(45deg);
        }
   .controls {
            margin-top: 30px;
        }
        button {
            background: linear-gradient(145deg, #ff0080, #ff8c00);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 0, 128, 0.5);
            transition: all 0.2s;
        }
        button:active { transform: scale(0.95); }
   .mobile-controls {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(3, 90px);
            gap: 15px;
            justify-content: center;
        }
   .mobile-controls button {
            padding: 28px;
            font-size: 32px;
            margin: 0;
            border-radius: 20px;
            background: linear-gradient(145deg, #00ff88, #00ccff);
        }
   .power-up-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #ffaa00;
            text-shadow: 0 0 20px #ffaa00;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes popup {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="power-up-text" id="powerText"></div>

    <div class="game-ui">
        <h1>🐍 SNAKE PRO MAX</h1>
        <div class="stats">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="high-score">Best: <span id="highScore">0</span></div>
            <div class="level">Level: <span id="level">1</span></div>
        </div>

        <div class="game-container">
            <canvas id="game" width="400" height="400"></canvas>
        </div>

        <div class="controls">
            <button onclick="startGame()">🚀 START GAME</button>
        </div>

        <div class="mobile-controls">
            <div></div>
            <button onclick="setDirection('up')">↑</button>
            <div></div>
            <button onclick="setDirection('left')">←</button>
            <button onclick="setDirection('down')">↓</button>
            <button onclick="setDirection('right')">→</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const particleCanvas = document.getElementById('particles');
        const pCtx = particleCanvas.getContext('2d');
        particleCanvas.width = window.innerWidth;
        particleCanvas.height = window.innerHeight;

        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const levelEl = document.getElementById('level');
        const powerText = document.getElementById('powerText');

        const grid = 20;
        let snake = [];
        let food = {};
        let specialFood = null;
        let dx = 1, dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let level = 1;
        let speed = 150;
        let gameRunning = false;
        let particles = [];
        let lastTime = 0;

        highScoreEl.textContent = highScore;

        // Sound effects using Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + duration);
        }

        function showPowerUp(text) {
            powerText.textContent = text;
            powerText.style.animation = 'none';
            setTimeout(() => powerText.style.animation = 'popup 0.8s ease-out', 10);
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x * grid + 10,
                    y: y * grid + 10,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color: color
                });
            }
        }

        function updateParticles() {
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                pCtx.fillStyle = p.color;
                pCtx.globalAlpha = p.life / 30;
                pCtx.fillRect(p.x, p.y, 4, 4);
                pCtx.globalAlpha = 1;
                return p.life > 0;
            });
        }

        function drawCube(x, y, color, isHead) {
            const px = x * grid, py = y * grid, h = 6;

            ctx.shadowColor = color;
            ctx.shadowBlur = isHead? 20 : 10;

            // 3D effect
            ctx.fillStyle = color;
            ctx.fillRect(px - h, py - h, grid, grid);

            ctx.fillStyle = shadeColor(color, -20);
            ctx.beginPath();
            ctx.moveTo(px - h + grid, py - h);
            ctx.lineTo(px + grid, py);
            ctx.lineTo(px + grid, py + grid);
            ctx.lineTo(px - h + grid, py - h + grid);
            ctx.fill();

            if (isHead) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(px - h + 6, py - h + 6, 8, 8);
            }
            ctx.shadowBlur = 0;
        }

        function shadeColor(color, percent) {
            const num = parseInt(color.slice(1), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt, G = (num >> 8 & 0x00FF) + amt, B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
        }

        function drawFood() {
            // Normal food
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 20;
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(food.x * grid + 10, food.y * grid + 10, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Special food - golden
            if (specialFood) {
                ctx.shadowColor = '#ffaa00';
                ctx.shadowBlur = 30;
                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                ctx.arc(specialFood.x * grid + 10, specialFood.y * grid + 10, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function initGame() {
            snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
            dx = 1; dy = 0;
            score = 0; level = 1; speed = 150;
            scoreEl.textContent = score;
            levelEl.textContent = level;
            generateFood();
            specialFood = null;
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * 20);
            food.y = Math.floor(Math.random() * 20);

            // 20% chance special food
            if (Math.random() < 0.2 &&!specialFood) {
                specialFood = {
                    x: Math.floor(Math.random() * 20),
                    y: Math.floor(Math.random() * 20)
                };
            }
        }

        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
                gameOver();
                return;
            }

            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Normal food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                playSound(600, 0.1);
                createParticles(food.x, food.y, '#ff0000');
                generateFood();

                // Level up every 50 points
                if (score % 50 === 0) {
                    level++;
                    speed = Math.max(60, speed - 10);
                    levelEl.textContent = level;
                    showPowerUp('LEVEL UP!');
                    playSound(800, 0.2);
                }
            }
            // Special food - 50 points
            else if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
                score += 50;
                playSound(1000, 0.2);
                createParticles(specialFood.x, specialFood.y, '#ffaa00');
                showPowerUp('+50 BONUS!');
                specialFood = null;
            }
            else {
                snake.pop();
            }

            scoreEl.textContent = score;
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            drawFood();
            snake.forEach((part, i) => {
                const hue = (i * 10) % 360;
                const color = i === 0? '#00ff88' : `hsl(${hue}, 100%, 50%)`;
                drawCube(part.x, part.y, color, i === 0);
            });
        }

        function gameLoop(time) {
            if (!gameRunning) return;
            requestAnimationFrame(gameLoop);

            if (time - lastTime > speed) {
                lastTime = time;
                update();
                draw();
            }
            updateParticles();
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            initGame();
            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            playSound(200, 0.5);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
                showPowerUp('NEW HIGH SCORE!');
            }
            setTimeout(() => alert(`Game Over!\nScore: ${score}\nLevel: ${level}`), 100);
        }

        function setDirection(dir) {
            if (!gameRunning) return;
            if (dir === 'up' && dy === 0) { dx = 0; dy = -1; }
            if (dir === 'down' && dy === 0) { dx = 0; dy = 1; }
            if (dir === 'left' && dx === 0) { dx = -1; dy = 0; }
            if (dir === 'right' && dx === 0) { dx = 1; dy = 0; }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') setDirection('up');
            if (e.key === 'ArrowDown') setDirection('down');
            if (e.key === 'ArrowLeft') setDirection('left');
            if (e.key === 'ArrowRight') setDirection('right');
        });

        initGame();
        draw();
    </script>
</body>
</html>
