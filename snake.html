<!DOCTYPE html>
<html>
<head>
    <title>Snake PRO MAX - WORKING</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
            touch-action: none;
        }
        #gameContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
       .hud {
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            background: #111;
        }
        canvas {
            border: 4px solid #00ff88;
            background: #0a0a0a;
            width: 350px;
            height: 350px;
        }
       .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
       .start-btn {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 25px;
            background: #00ff88;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
       .dpad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            gap: 10px;
        }
       .dpad button {
            padding: 20px;
            font-size: 24px;
            border: none;
            border-radius: 12px;
            background: #00ccff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
       .dpad button:active {
            background: #00ff88;
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="hud">
            <div>SCORE: <span id="score">0</span></div>
            <div>BEST: <span id="best">0</span></div>
            <div>LEVEL: <span id="level">1</span></div>
        </div>

        <canvas id="game" width="400" height="400"></canvas>

        <div class="controls">
            <button class="start-btn" id="startBtn">START GAME</button>
            <div class="dpad">
                <div></div>
                <button id="up">↑</button>
                <div></div>
                <button id="left">←</button>
                <button id="down">↓</button>
                <button id="right">→</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const levelEl = document.getElementById('level');
        const startBtn = document.getElementById('startBtn');

        let snake, food, dx, dy, score, level, speed, gameRunning, gameLoop;
        let best = localStorage.getItem('snakeBest') || 0;
        bestEl.textContent = best;

        function init() {
            snake = [{x: 10, y: 10}, {x: 9, y: 10}];
            dx = 1; dy = 0;
            score = 0; level = 1; speed = 150;
            gameRunning = false;
            spawnFood();
            updateHUD();
            draw();
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * 20),
                y: Math.floor(Math.random() * 20)
            };
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, 400, 400);

            // Draw food
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(food.x * 20, food.y * 20, 18, 18);

            // Draw snake
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0? '#00ff88' : '#00cc66';
                ctx.fillRect(segment.x * 20, segment.y * 20, 18, 18);
            });
        }

        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Wall collision
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
                return gameOver();
            }

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                if (score % 50 === 0) {
                    level++;
                    speed = Math.max(70, speed - 10);
                }
                spawnFood();
            } else {
                snake.pop();
            }

            updateHUD();
            draw();
        }

        function updateHUD() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
        }

        function startGame() {
            if (gameRunning) return;
            init();
            gameRunning = true;
            startBtn.textContent = 'PLAYING...';
            startBtn.disabled = true;
            gameLoop = setInterval(update, speed);
        }

        function gameOver() {
            clearInterval(gameLoop);
            gameRunning = false;
            startBtn.textContent = 'RESTART';
            startBtn.disabled = false;

            if (score > best) {
                best = score;
                localStorage.setItem('snakeBest', best);
                bestEl.textContent = best;
                alert('NEW HIGH SCORE: ' + score);
            } else {
                alert('GAME OVER!\nScore: ' + score);
            }
        }

        function changeDirection(newDx, newDy) {
            if (!gameRunning) return;
            // Prevent reverse
            if (dx === -newDx && dy === -newDy) return;
            dx = newDx;
            dy = newDy;
        }

        // Button events - YE WALA 100% CHALTA HAI
        document.getElementById('up').onclick = () => changeDirection(0, -1);
        document.getElementById('down').onclick = () => changeDirection(0, 1);
        document.getElementById('left').onclick = () => changeDirection(-1, 0);
        document.getElementById('right').onclick = () => changeDirection(1, 0);
        document.getElementById('startBtn').onclick = startGame;

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') changeDirection(0, -1);
            if (e.key === 'ArrowDown') changeDirection(0, 1);
            if (e.key === 'ArrowLeft') changeDirection(-1, 0);
            if (e.key === 'ArrowRight') changeDirection(1, 0);
            if (e.key === ' ' &&!gameRunning) startGame();
        });

        // Start
        init();
    </script>
</body>
</html>
