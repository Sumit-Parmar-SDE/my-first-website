<!DOCTYPE html>
<html>
<head>
    <title>Snake PRO MAX ULTRA - Sumit SDE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: 'Impact', sans-serif;
            color: white;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    .hud {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 18px;
            z-index: 10;
            text-shadow: 0 0 10px #000;
            padding: 0 10px;
        }
    .combo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: #ffaa00;
            text-shadow: 0 0 30px #ffaa00;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }
        @keyframes pop {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
        canvas {
            border: 5px solid #ff0080;
            box-shadow: 0 0 50px #ff0080;
            background: radial-gradient(circle, #1a0033 0%, #000 100%);
            max-width: 95vw;
            max-height: 50vh;
        }
    .shake {
            animation: shake 0.3s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    .mobile-controls {
            position: absolute;
            bottom: 20px;
            display: grid;
            grid-template-columns: repeat(3, 75px);
            gap: 10px;
        }
    .mobile-controls button {
            padding: 22px;
            font-size: 28px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(145deg, #00ff88, #00ccff);
            color: #000;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.5);
            cursor: pointer;
        }
    .mobile-controls button:active {
            transform: scale(0.9);
            background: linear-gradient(145deg, #00ccff, #00ff88);
        }
    .start-btn {
            position: absolute;
            bottom: 180px;
            padding: 18px 45px;
            font-size: 22px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 30px #00ff88;
            z-index: 15;
        }
    .start-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="hud">
            <div>🔥 <span id="score">0</span></div>
            <div>⚡ <span id="combo">x1</span></div>
            <div>👑 <span id="best">0</span></div>
            <div>🎯 L<span id="level">1</span></div>
        </div>

        <div class="combo" id="comboText"></div>
        <canvas id="game" width="400" height="400"></canvas>

        <button class="start-btn" id="startBtn">🚀 START</button>

        <div class="mobile-controls">
            <div></div>
            <button id="upBtn">↑</button>
            <div></div>
            <button id="leftBtn">←</button>
            <button id="downBtn">↓</button>
            <button id="rightBtn">→</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const bestEl = document.getElementById('best');
        const levelEl = document.getElementById('level');
        const comboText = document.getElementById('comboText');
        const startBtn = document.getElementById('startBtn');

        let snake, food, bombs, walls, dx, dy, score, combo, comboTimer, level, speed, gameRunning, lastTime;
        let starPower = false, starTimer = 0;
        let best = localStorage.getItem('snakeBest') || 0;
        bestEl.textContent = best;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(f, d, t = 'sine') {
            try {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.value = f; o.type = t;
                g.gain.setValueAtTime(0.2, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        function showCombo(text) {
            comboText.textContent = text;
            comboText.style.animation = 'none';
            setTimeout(() => comboText.style.animation = 'pop 0.6s', 10);
        }

        function shakeScreen() {
            container.classList.add('shake');
            setTimeout(() => container.classList.remove('shake'), 300);
        }

        function init() {
            snake = [{x: 10, y: 10}, {x: 9, y: 10}];
            dx = 1; dy = 0;
            score = 0; combo = 1; comboTimer = 0; level = 1; speed = 120;
            starPower = false;
            walls = [];
            spawnFood();
            spawnBombs();
            updateHUD();
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random()*20),
                y: Math.floor(Math.random()*20),
                type: Math.random() < 0.2? 'star' : 'normal'
            };
        }

        function spawnBombs() {
            bombs = [];
            for(let i = 0; i < level; i++) {
                bombs.push({x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)});
            }
        }

        function drawBlock(x, y, color, glow = false) {
            const px = x * 20, py = y * 20;
            if(glow) {
                ctx.shadowColor = color;
                ctx.shadowBlur = 15;
            }
            ctx.fillStyle = color;
            ctx.fillRect(px + 1, py + 1, 18, 18);
            ctx.shadowBlur = 0;
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, 400, 400);

            bombs.forEach(b => {
                drawBlock(b.x, b.y, '#ff0000', true);
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.fillText('💣', b.x*20+2, b.y*20+16);
            });

            if(food.type === 'star') {
                drawBlock(food.x, food.y, '#ffaa00', true);
                ctx.fillStyle = '#fff';
                ctx.fillText('⭐', food.x*20+2, food.y*20+16);
            } else {
                drawBlock(food.x, food.y, '#00ff00', true);
            }

            snake.forEach((s, i) => {
                const color = starPower? `hsl(${Date.now()/5 % 360}, 100%, 50%)` : i === 0? '#00ff88' : `hsl(${i*20}, 100%, 50%)`;
                drawBlock(s.x, s.y, color, i === 0);
            });
        }

        function update() {
            if(starPower) {
                starTimer--;
                if(starTimer <= 0) starPower = false;
            }

            comboTimer--;
            if(comboTimer <= 0) combo = 1;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if(head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) return gameOver();
            if(snake.some(s => s.x === head.x && s.y === head.y) &&!starPower) return gameOver();
            if(bombs.some(b => b.x === head.x && b.y === head.y) &&!starPower) {
                score = Math.max(0, score - 20);
                beep(150, 0.3, 'sawtooth');
                shakeScreen();
                showCombo('BOOM!');
                spawnBombs();
                updateHUD();
                return;
            }

            snake.unshift(head);

            if(head.x === food.x && head.y === food.y) {
                if(food.type === 'star') {
                    starPower = true;
                    starTimer = 300;
                    score += 50 * combo;
                    beep(1000, 0.2);
                    showCombo('STAR POWER!');
                } else {
                    score += 10 * combo;
                    beep(600 + combo*50, 0.1);
                    combo++;
                    comboTimer = 120;
                    if(combo > 1) showCombo(combo + 'x COMBO!');
                }

                if(score >= level * 100) {
                    level++;
                    speed = Math.max(50, speed - 8);
                    spawnBombs();
                    showCombo('LEVEL ' + level);
                    beep(800, 0.3);
                }
                spawnFood();
            } else {
                snake.pop();
            }

            updateHUD();
        }

        function updateHUD() {
            scoreEl.textContent = score;
            comboEl.textContent = 'x' + combo;
            levelEl.textContent = level;
        }

        function gameLoop(time) {
            if(!gameRunning) return;
            requestAnimationFrame(gameLoop);
            if(time - lastTime > speed) {
                lastTime = time;
                update();
                draw();
            }
        }

        function startGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            init();
            gameRunning = true;
            startBtn.style.display = 'none';
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            beep(100, 0.5, 'sawtooth');
            shakeScreen();
            if(score > best) {
                best = score;
                localStorage.setItem('snakeBest', best);
                bestEl.textContent = best;
                showCombo('NEW RECORD!');
            }
            setTimeout(() => {
                alert(`GAME OVER!\nScore: ${score}\nMax Combo: x${combo}\nLevel: ${level}`);
                startBtn.style.display = 'block';
            }, 100);
        }

        function setDir(x, y) {
            if(!gameRunning) return;
            if(x!== 0 && dx === 0) { dx = x; dy = 0; }
            if(y!== 0 && dy === 0) { dx = 0; dy = y; }
        }

        // Fixed button events
        document.getElementById('upBtn').addEventListener('click', () => setDir(0, -1));
        document.getElementById('downBtn').addEventListener('click', () => setDir(0, 1));
        document.getElementById('leftBtn').addEventListener('click', () => setDir(-1, 0));
        document.getElementById('rightBtn').addEventListener('click', () => setDir(1, 0));
        document.getElementById('startBtn').addEventListener('click', startGame);

        // Keyboard
        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') setDir(0, -1);
            if(e.key === 'ArrowDown') setDir(0, 1);
            if(e.key === 'ArrowLeft') setDir(-1, 0);
            if(e.key === 'ArrowRight') setDir(1, 0);
            if(e.key === ' ' &&!gameRunning) startGame();
        });

        init();
        draw();
    </script>
</body>
</html>
