<!DOCTYPE html>
<html>
<head>
    <title>Snake Game - Sumit SDE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }
        h1 {
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00ff00, #00cc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
       .score {
            font-size: 24px;
            margin-bottom: 20px;
        }
        canvas {
            border: 3px solid #00ff00;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }
       .controls {
            margin-top: 20px;
            text-align: center;
        }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }
       .keys {
            margin-top: 15px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🐍 SNAKE GAME</h1>
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="controls">
        <button onclick="startGame()">Start / Restart</button>
        <div class="keys">Use Arrow Keys ↑ ↓ ← → to move</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        const grid = 20;
        let snake = [{x: 160, y: 160}];
        let food = {x: 320, y: 320};
        let dx = grid;
        let dy = 0;
        let score = 0;
        let gameRunning = false;

        function drawSnake() {
            ctx.fillStyle = '#00ff00';
            snake.forEach(part => {
                ctx.fillRect(part.x, part.y, grid-2, grid-2);
            });
        }

        function drawFood() {
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(food.x, food.y, grid-2, grid-2);
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * 20) * grid;
            food.y = Math.floor(Math.random() * 20) * grid;
        }

        function checkCollision() {
            const head = snake[0];

            if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
                return true;
            }

            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function gameLoop() {
            if (!gameRunning) return;

            if (checkCollision()) {
                gameRunning = false;
                alert('Game Over! Score: ' + score);
                return;
            }

            ctx.clearRect(0, 0, 400, 400);
            moveSnake();
            drawFood();
            drawSnake();

            setTimeout(gameLoop, 100);
        }

        function startGame() {
            snake = [{x: 160, y: 160}];
            dx = grid;
            dy = 0;
            score = 0;
            scoreEl.textContent = score;
            generateFood();
            gameRunning = true;
            gameLoop();
        }

        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -grid; }
            if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = grid; }
            if (e.key === 'ArrowLeft' && dx === 0) { dx = -grid; dy = 0; }
            if (e.key === 'ArrowRight' && dx === 0) { dx = grid; dy = 0; }
        });
    </script>
</body>
</html>
