<!DOCTYPE html>
<html>
<head>
    <title>Sumit's Calculator</title>
    <style>
        body {
    background-color: #1a1a1a;
    font-family: Arial;
}
        button {
    background-color: #505050;
    color: white;
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 24px;
    margin: 5px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent; /* Mobile lag fix */
}

button:active {
    background-color: #909090; /* Dabaane pe instant feedback */
}

.calculator {
    background-color: black;
    padding: 20px;
    border-radius: 20px;
    width: 300px;
    margin: 50px auto;
}

.display {
    background-color: #333;
    color: white;
    font-size: 40px;
    padding: 20px;
    text-align: right;
    border-radius: 10px;
    margin-bottom: 10px;
}

button {
    background-color: #505050;
    color: white;
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 24px;
    margin: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #707070;
}
        }
        .operator {
            background-color: #ff9500;
            color: white;
        }
        .equals {
            background-color: #2196F3;
            color: white;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h2>Sumit's Calculator</h2>
        <input type="text" id="display" disabled>
        <br>
        <button onclick="clearDisplay()">C</button>
        <button onclick="appendToDisplay('/')" class="operator">/</button>
        <button onclick="appendToDisplay('*')" class="operator">×</button>
        <button onclick="deleteLast()">DEL</button>
        <br>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('-')" class="operator">-</button>
        <br>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('+')" class="operator">+</button>
        <br>
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="calculate()" class="equals" style="height: 130px; float: right;">=</button>
        <br>
        <button onclick="appendToDisplay('0')" style="width: 130px;">0</button>
        <button onclick="appendToDisplay('.')">.</button>
    </div>

    <script>
        let display = document.getElementById('display');
let currentInput = '';

function appendNumber(num) {
    currentInput += num;
    display.value = currentInput;
}

function appendOperator(op) {
    currentInput += op;
    display.value = currentInput;
}

function calculate() {
    try {
        // eval hata diya, ye fast version hai
        currentInput = Function('"use strict";return (' + currentInput + ')')();
        display.value = currentInput;
    } catch {
        display.value = 'Error';
        currentInput = '';
    }
}

function clearDisplay() {
    currentInput = '';
    display.value = '';
}
        }
    </script>
</body>
</html>
