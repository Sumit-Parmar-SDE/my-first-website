<!DOCTYPE html>
<html>
<head>
    <title>Sumit's To-Do App</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f0f0f0; }
        .box { background: white; max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 10px; }
        input { padding: 10px; width: 70%; }
        button { padding: 10px; background: blue; color: white; border: none; }
        li { text-align: left; margin: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>My To-Do List</h1>
        <input type="text" id="task" placeholder="Naya task likho">
        <button onclick="addTask()">Add</button>
        <ul id="list"></ul>
        <br>
        <a href="index.html">← Back to Portfolio</a>
    </div>

    <script>
        function addTask() {
            let input = document.getElementById("task");
            let taskText = input.value;
            
            if (taskText === "") {
                alert("Bhai kuch likh to sahi");
                return;
            }
            
            let li = document.createElement("li");
            li.innerHTML = taskText + " <button onclick='this.parentElement.remove()'>Delete</button>";
            document.getElementById("list").appendChild(li);
            
            input.value = "";
        }
    </script>
</body>
</html>
