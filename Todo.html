<!DOCTYPE html>
<html>
<head>
    <title>Sumit ka To-Do App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
        }
        .container {
            background: white;
            color: black;
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        input {
            padding: 10px;
            width: 70%;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: #f1f1f1;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li button {
            background-color: #dc3545;
        }
        li button:hover {
            background-color: #c82333;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My To-Do List</h1>
        <input type="text" id="taskInput" placeholder="Naya task likho...">
        <button onclick="addTask()">Add Task</button>
        <ul id="taskList"></ul>
        <br>
        <p><a href="index.html">← Back to Portfolio</a></p>
    </div>

    <script>
        // Page load hote hi purane tasks dikhao
        window.onload = function() {
            showTasks();
        }

        function addTask() {
            let input = document.getElementById("taskInput");
            let taskText = input.value.trim();
            if (taskText === "") return;

            // localStorage se purane tasks nikalo
            let tasks = JSON.parse(localStorage.getItem("myTasks")) || [];
            tasks.push(taskText);
            
            // Wapas save kar do
            localStorage.setItem("myTasks", JSON.stringify(tasks));
            
            input.value = "";
            showTasks();
        }

        function deleteTask(index) {
            let tasks = JSON.parse(localStorage.getItem("myTasks")) || [];
            tasks.splice(index, 1);
            localStorage.setItem("myTasks", JSON.stringify(tasks));
            showTasks();
        }

        function showTasks() {
            let taskList = document.getElementById("taskList");
            taskList.innerHTML = "";
            
            let tasks = JSON.parse(localStorage.getItem("myTasks")) || [];
            tasks.forEach(function(task, index) {
                taskList.innerHTML += `
                    <li>
                        ${task} 
                        <button onclick="deleteTask(${index})">Delete</button>
                    </li>
                `;
            });
        }
    </script>
</body>
</html>
